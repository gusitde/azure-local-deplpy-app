# ============================================================================
# Azure Local Deploy – Sample Configuration
# ============================================================================
# Copy this file to  deploy-config.yaml  and fill in your values.
# All secrets (passwords, keys) can also be passed via environment variables
# prefixed with ALD_ (e.g. ALD_IDRAC_PASSWORD).
# ============================================================================

# ---------------------------------------------------------------------------
# Global defaults (can be overridden per-server)
# ---------------------------------------------------------------------------
global:
  # HTTP/NFS/CIFS URL to the Azure Local OS ISO, accessible from every iDRAC
  iso_url: "https://yourfileserver.corp.local/images/AzureLocal_25H2.iso"

  # NTP servers for all nodes
  ntp_servers:
    - time.windows.com
    - pool.ntp.org

  # Windows timezone id (optional)
  timezone: "UTC"

  # HTTPS proxy (blank = direct)
  proxy_url: ""

  # Path to OEM Solution Builder Extension (SBE) content.
  # Copied to C:\SBE on each node before deployment.
  # See: https://learn.microsoft.com/en-us/azure/azure-local/concepts/system-requirements-23h2#hardware-requirements
  sbe_source: ""

  # Check online Azure Local docs before deployment (default true)
  check_docs: true

  # Abort pipeline if pre-flight validation finds failures
  abort_on_validation_failure: true

# ---------------------------------------------------------------------------
# Firmware update settings
# ---------------------------------------------------------------------------
firmware:
  # Dell Repository catalog URL (uses Dell Repository Manager or downloads.dell.com)
  # If set, all components are updated from the catalog automatically.
  # catalog_url: "https://downloads.dell.com/catalog/Catalog.xml"
  catalog_url: ""

  # -- OR -- specify individual DUP targets (used when catalog_url is empty):
  targets: []
    # - component: "BIOS"
    #   dup_url: "https://fileserver.corp.local/firmware/BIOS_W7N09_WN64_2.21.0.EXE"
    #   target_version: "2.21.0"
    #   install_option: "NowAndReboot"   # Now | NowAndReboot | NextReboot
    # - component: "iDRAC"
    #   dup_url: "https://fileserver.corp.local/firmware/iDRAC-with-Lifecycle-Controller_7.00.60.00.EXE"
    #   target_version: "7.00.60.00"
    #   install_option: "NowAndReboot"
    # - component: "NIC"
    #   dup_url: "https://fileserver.corp.local/firmware/Network_Firmware_XXXX.EXE"
    #   target_version: ""
    #   install_option: "NowAndReboot"

  # Reboot after firmware updates to apply
  apply_reboot: true
  # Max wait for firmware update tasks (seconds)
  task_timeout: 3600

# ---------------------------------------------------------------------------
# BIOS configuration
# ---------------------------------------------------------------------------
bios:
  # Profile name (informational)
  profile: "AzureLocal"

  # Reboot after BIOS changes to apply
  apply_reboot: true
  task_timeout: 1200

  # Custom attribute overrides (merged on top of Azure Local defaults).
  # The defaults already set: VT, VT-d, SR-IOV, SecureBoot, UEFI, TPM,
  # MemOpMode=Optimizer, LogicalProc=Enabled, ProcCStates=Disabled, etc.
  # Only specify attributes you want to override:
  attributes: {}
    # SysProfile: "PerfOptimized"
    # ProcCStates: "Enabled"

# ---------------------------------------------------------------------------
# Microsoft Environment Checker (AzStackHci.EnvironmentChecker)
# Installs on each node via SSH, runs validators, then uninstalls.
# See: https://learn.microsoft.com/en-us/azure/azure-local/manage/use-environment-checker
# ---------------------------------------------------------------------------
environment_checker:
  # Which validators to run (null = all 5).  Options:
  #   Connectivity, Hardware, Active Directory, Network, Arc Integration
  validators: null

  # Timeout (seconds) for installing the PS module on each node
  install_timeout: 300

  # Timeout (seconds) per validator execution
  validator_timeout: 600

  # Uninstall the module after checks (Microsoft requires this before deploy)
  auto_uninstall: true

# ---------------------------------------------------------------------------
# Azure configuration
# ---------------------------------------------------------------------------
azure:
  tenant_id:        "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"
  subscription_id:  "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"
  resource_group:   "rg-azurelocal-prod"
  region:           "eastus"

# ---------------------------------------------------------------------------
# Cluster-level settings
# ---------------------------------------------------------------------------
cluster:
  name: "azlocal-cluster-01"
  # Static IP for the Windows Failover Cluster name object
  cluster_ip: "10.0.1.100"
  # Active Directory (leave blank for AD-less deployment)
  domain_fqdn: "corp.local"
  ou_path: "OU=AzureLocal,DC=corp,DC=local"
  # Max wait for cloud deployment (seconds)
  deployment_timeout: 7200
  # Optional storage-network overrides
  # storage_networks:
  #   - name: Storage1
  #     vlan_id: 711

# ---------------------------------------------------------------------------
# Server list
# ---------------------------------------------------------------------------
servers:
  # ---- Node 1 -----------------------------------------------------------
  - idrac_host: "10.0.0.11"
    idrac_user: "root"
    idrac_password: "Calvin123!"     # change me!
    host_ip: "10.0.1.11"
    host_user: "Administrator"
    host_password: "P@ssw0rd!"       # change me!
    ssh_port: 22
    install_timeout: 3600

    # Azure Arc resource id (populated after agent deployment)
    arc_resource_id: ""

    # Desired Windows hostname for this node (optional).
    # If set, the node is renamed and rebooted before network configuration.
    hostname: ""

    # Per-server ISO override (optional – falls back to global.iso_url)
    # iso_url: ""

    # Network adapters
    nics:
      - adapter_name: "Mgmt"

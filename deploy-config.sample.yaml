# ---------------------------------------------------------------------------
# Add Node configuration (used by add-node command / wizard)
# ---------------------------------------------------------------------------
add_node:
  # Name of the existing cluster to add nodes to
  existing_cluster_name: "azlocal-cluster-01"
  # Resource group of the existing cluster (defaults to azure.resource_group)
  existing_cluster_resource_group: "rg-azurelocal-prod"

  # SSH credentials for an existing healthy cluster node.
  # Used for: OS version matching, post-add quorum/storage configuration,
  # and post-join cluster health validation.
  existing_node:
    host: "10.0.1.11"            # IP of any existing cluster node
    user: "Administrator"
    password: "P@ssw0rd!"        # change me!
    ssh_port: 22

# Proxy settings for new nodes (also used by add-node pipeline)
# proxy:
#   http_proxy: "http://proxy.corp.local:8080"
#   https_proxy: "http://proxy.corp.local:8080"
#   no_proxy: "localhost,127.0.0.1,.corp.local"

# Pre-flight validation toggles
# validation:
#   run_pre_flight: true           # Run hardware & environment checks
#   abort_on_failure: true         # Abort pipeline on check failures

# Security profile applied to new nodes (recommended | custom)
# security:
#   profile: "recommended"

# ---------------------------------------------------------------------------
# Rebuild Cluster configuration (used by rebuild command / wizard)
# ---------------------------------------------------------------------------
rebuild:
  # Source cluster to rebuild
  source_cluster:
    host: "10.0.1.11"            # Any node IP in the existing cluster
    username: "Administrator"
    password: "P@ssw0rd!"        # change me!
    ssh_port: 22

  # Temporary migration target – VMs will live here during rebuild
  migration_target:
    host: "10.0.1.50"            # Standalone Hyper-V host or another cluster node
    username: "Administrator"
    password: "P@ssw0rd!"        # change me!
    type: "hyperv_host"          # hyperv_host | hyperv_cluster | azure_vm
    storage_path: "C:\\ClusterStorage\\Volume1"

  # VM backup before migration (strongly recommended)
  backup:
    enabled: true
    backup_path: "\\\\fileserver\\backups\\rebuild-2025"
    backup_type: "export"        # export | checkpoint
    parallel_backups: 2
    verify_backup: true
    exclude_vms: []              # VM names to skip backup for

  # Migration method
  migration_method: "live"       # live | quick | export_import

# ---------------------------------------------------------------------------
# Authentication & API configuration
# ---------------------------------------------------------------------------
auth:
  # JWT settings
  jwt_secret: ""                 # Auto-generated if empty
  access_token_ttl: 3600         # 1 hour
  refresh_token_ttl: 604800      # 7 days

  # Default admin user (created on first launch)
  default_admin:
    username: "admin"
    password: "admin123"         # change on first login!

  # API key settings
  api_keys_enabled: true

# ---------------------------------------------------------------------------
# AI Provider configuration
# ---------------------------------------------------------------------------
ai:
  # Primary provider (REQUIRED for AI features)
  primary:
    provider: "openai"           # openai | azure_openai
    api_key: ""                  # or set OPENAI_API_KEY env var
    model: "gpt-5"
    # Azure OpenAI only:
    # endpoint: "https://your-resource.openai.azure.com/"
    # deployment_name: "gpt-5-deployment"
    # api_version: "2025-12-01"
    max_tokens: 4096
    temperature: 0.3

  # Secondary provider (optional, for code / IaC generation)
  secondary:
    provider: "anthropic"        # anthropic | openai | azure_openai
    api_key: ""                  # or set ANTHROPIC_API_KEY env var
    model: "claude-opus-4-20250514"
    max_tokens: 8192
    temperature: 0.2

  # Task routing: which provider handles each task type
  task_routing:
    dependency_analysis: "primary"
    runbook_generation: "primary"
    downtime_estimation: "primary"
    risk_assessment: "primary"
    interactive_chat: "primary"
    script_generation: "secondary"
    iac_generation: "secondary"
    terminal_automation: "secondary"
    code_review: "secondary"
    log_analysis: "secondary"
    fallback: "primary"

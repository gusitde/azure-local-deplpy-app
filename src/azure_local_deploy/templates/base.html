<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Azure Local Deploy{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        :root { --bs-body-bg: #0d1117; --bs-body-color: #c9d1d9; }
        body { min-height: 100vh; }
        .wizard-sidebar { background: #161b22; min-height: 100vh; border-right: 1px solid #30363d; }
        .wizard-sidebar .step { padding: 12px 20px; border-left: 3px solid transparent; color: #8b949e; }
        .wizard-sidebar .step.active { border-left-color: #58a6ff; color: #f0f6fc; background: #0d1117; }
        .wizard-sidebar .step.completed { border-left-color: #3fb950; color: #3fb950; }
        .wizard-sidebar .step .step-num { display: inline-flex; width: 28px; height: 28px; align-items: center;
            justify-content: center; border-radius: 50%; border: 2px solid currentColor; font-size: .8rem; margin-right: 10px; }
        .wizard-sidebar .step.completed .step-num { background: #3fb950; border-color: #3fb950; color: #0d1117; }
        .card { background: #161b22; border: 1px solid #30363d; }
        .form-control, .form-select { background: #0d1117; border-color: #30363d; color: #c9d1d9; }
        .form-control:focus, .form-select:focus { background: #0d1117; border-color: #58a6ff; color: #f0f6fc; box-shadow: 0 0 0 .15rem rgba(88,166,255,.25); }
        .btn-primary { background: #238636; border-color: #238636; }
        .btn-primary:hover { background: #2ea043; border-color: #2ea043; }
        .btn-outline-primary { color: #58a6ff; border-color: #30363d; }
        .btn-outline-primary:hover { background: #161b22; color: #58a6ff; border-color: #58a6ff; }
        .hero-icon { font-size: 4rem; color: #58a6ff; }
        .log-output { background: #0d1117; border: 1px solid #30363d; border-radius: 6px; padding: 16px;
            font-family: 'Cascadia Code', 'Fira Code', monospace; font-size: .85rem; max-height: 500px;
            overflow-y: auto; color: #c9d1d9; }
        .log-output .log-time { color: #8b949e; margin-right: 8px; }
        .log-output .log-success { color: #3fb950; }
        .log-output .log-error { color: #f85149; }
        .progress-stage { padding: 8px 16px; margin: 4px 0; border-radius: 6px; background: #161b22; border: 1px solid #30363d; }
        .progress-stage.running { border-color: #58a6ff; }
        .progress-stage.done { border-color: #3fb950; }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    {% block body %}
    <nav class="navbar navbar-dark bg-dark border-bottom border-secondary">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">
                <i class="bi bi-cloud-upload"></i> Azure Local Deploy
            </a>
            <span class="navbar-text small">Deployment Wizard</span>
        </div>
    </nav>
    <main class="container-fluid">
        {% block content %}{% endblock %}
    </main>
    {% endblock %}
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>

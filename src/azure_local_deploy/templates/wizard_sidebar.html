{# Reusable wizard sidebar – pass `steps` list and `current_step` #}
<div class="wizard-sidebar py-4">
    <h6 class="px-3 mb-3 text-uppercase text-secondary small">
        {% if mode == 'add_node' %}Add Node Wizard{% else %}New Cluster Wizard{% endif %}
    </h6>
    {% for s in steps %}
    <div class="step {% if loop.index == current_step %}active{% elif loop.index < current_step %}completed{% endif %}">
        <span class="step-num">
            {% if loop.index < current_step %}<i class="bi bi-check"></i>{% else %}{{ loop.index }}{% endif %}
        </span>
        {{ s }}
    </div>
    {% endfor %}
    <hr class="mx-3 border-secondary">
    <div class="px-3">
        <a href="/wizard/reset" class="btn btn-sm btn-outline-secondary w-100"><i class="bi bi-x-circle"></i> Reset</a>
    </div>
</div>
